<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Metricus Studio — see how AI recommends your brand</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0e0f12; --panel:#161821; --ink:#e7ecf3; --ink-dim:#9aa3b2;
    --accent:#7cc1ff; --accent-2:#ffb86b; --good:#7ee787; --bad:#ff7b72;
    --line:#262a36;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",ui-sans-serif,system-ui,sans-serif}
  /* sticky-footer layout: footer floats to viewport bottom on short pages,
     sits after the content naturally on tall ones */
  body{ min-height: 100vh; display: flex; flex-direction: column; }
  main{ flex: 1 0 auto; }
  .site-footer{ flex-shrink: 0; }
  header{padding:14px 20px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  /* Brand link matches metricusapp.com nav: square SVG logo + Newsreader italic wordmark */
  header .brand{
    display: flex; flex-direction: row; align-items: center; gap: 8px;
    color: var(--ink);
    text-decoration: none;
  }
  header .brand:hover .brand-wordmark{ color: var(--accent); }
  .brand-logo{ width: 18px; height: 18px; color: var(--accent); flex-shrink: 0; }
  .brand-wordmark{
    font-family: 'Newsreader', Georgia, serif;
    font-style: italic;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1;
    transition: color 0.12s;
  }
  .brand-sub{
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
    border-left: 1px solid var(--line);
    padding-left: 8px;
    margin-left: 2px;
    line-height: 1;
  }
  /* Site footer matches metricusapp.com legal strip */
  .site-footer{
    border-top: 1px solid var(--line);
    padding: 22px 24px;
    margin-top: 40px;
    background: var(--bg);
  }
  .site-footer-inner{
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .site-footer-copy{
    margin: 0;
    color: var(--ink-dim);
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .site-footer-links{
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
  }
  .site-footer-links a{
    color: var(--ink-dim);
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-decoration: none;
    transition: color 0.12s;
  }
  .site-footer-links a:hover{ color: var(--ink); }
  @media (max-width: 720px){
    .site-footer-inner{ flex-direction: column; align-items: flex-start; }
  }

  .beta-tag{
    font-size: 9px;
    font-weight: 500;
    color: var(--accent);
    background: rgba(124, 193, 255, 0.12);
    border: 1px solid rgba(124, 193, 255, 0.3);
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    vertical-align: super;
    line-height: 1.4;
  }
  header .tagline{color:var(--ink-dim);font-size:11px;letter-spacing:.02em}
  header .meta{color:var(--ink-dim);font-size:12px}
  .pill{background:#222633;color:var(--ink-dim);border-radius:999px;
    padding:2px 10px;font-size:12px}
  main{display:block; padding:14px 20px}
  main .tab-panel{max-width:1180px;margin:0 auto}
  main .tab-panel[hidden]{display:none}
  /* Tab nav (session-3 T-B + v5 simple/advanced/exploration) */
  .tabs{display:inline-flex;gap:4px;margin-left:auto;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .tabs .tab{background:#0e1018;border:none;color:var(--ink-dim);padding:6px 14px;
    cursor:pointer;font-size:12px;letter-spacing:.04em;text-transform:uppercase;font-weight:600;
    font-family:'IBM Plex Sans',system-ui,sans-serif}
  .tabs .tab:hover{color:var(--ink)}
  .tabs .tab.active{background:var(--accent);color:#0a0c12}
  /* ========== v6 Simple — prompt investigation workbench ========== */
  /* Bare two-panel layout: prompt GUI on left, AI response + per-brand pCTR on right.
     Matches Advanced/Exploration dark mode — no editorial typography, no hero number. */
  .simple-workbench{
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 18px;
    padding: 4px 0 32px;
  }
  .sw-intro{
    color: var(--ink-dim);
    font-size: 13px;
    line-height: 1.5;
  }
  /* Single layout: horizontal top bar (prompt + brand + Run) always. The result
     panel below only appears once a pipeline has run. */
  .sw-grid{
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
    align-items: start;
  }
  .sw-left, .sw-right{
    background: var(--panel);
    border: 1px solid #1f2330;
    border-radius: 10px;
    padding: 14px 18px;
  }
  .sw-right{ display: none; }                            /* hidden until first run */
  .simple-workbench.has-result .sw-right{ display: block; }
  /* Each label+textarea pair is a single grid item via .sw-field */
  .sw-field{ display: block; }
  .sw-field textarea{ display: block; }
  /* Horizontal bar: prompt | brand | Run button */
  .sw-left{
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 14px;
    align-items: center;
  }
  .sw-left textarea{
    min-height: 72px;
    max-height: 72px;
    transition: max-height 0.2s;
    font-size: 13px;
    padding: 10px 12px;
  }
  .sw-left textarea:focus{ max-height: 200px; }
  .sw-left .sw-actions{
    margin: 0;
    flex-direction: column;
    align-items: stretch;
    gap: 6px;
  }
  .sw-left .sw-run-hint{ font-size: 10px; }
  .sw-left .sw-label{ margin-bottom: 4px; font-size: 10px; }
  .sw-run{ padding: 8px 16px; font-size: 13px; }
  @media (max-width: 920px){
    .sw-left{ grid-template-columns: 1fr; }
  }
  .sw-label{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 10px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .sw-counter{
    font-family: ui-monospace, SFMono-Regular, monospace;
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.04em;
    text-transform: none;
  }
  .sw-counter.near{ color: var(--accent-2); }
  .sw-counter.full{ color: var(--bad); }
  .sw-left textarea{
    width: 100%;
    min-height: 120px;
    background: #0e1018;
    border: 1px solid #232838;
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--ink);
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    resize: vertical;
    box-sizing: border-box;
  }
  .sw-left textarea:focus{ outline: none; border-color: var(--accent); }
  .sw-hint{
    color: var(--ink-dim);
    font-size: 11px;
    line-height: 1.45;
    margin-top: 6px;
  }
  .sw-left input[type="text"]{
    width: 100%;
    background: #0e1018;
    border: 1px solid #232838;
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--ink);
    font-family: inherit;
    font-size: 13px;
    box-sizing: border-box;
  }
  .sw-left input:focus{ outline: none; border-color: var(--accent); }
  .sw-row{ margin-top: 14px; }
  .sw-actions{
    margin-top: 12px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .sw-run{
    background: var(--accent);
    color: #0a0c12;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
  }
  .sw-run:hover{ background: #a3d4ff; }
  .sw-run:disabled{ opacity: 0.5; cursor: wait; }
  .sw-run-hint{ color: var(--ink-dim); font-size: 10px; text-align: center; }

  /* Right panel — empty state + result */
  .sw-result-empty{
    color: var(--ink-dim);
    font-size: 13px;
    text-align: center;
    padding: 60px 20px;
    line-height: 1.6;
  }
  .sw-result-empty kbd{
    background: #0e1018;
    border: 1px solid #232838;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    color: var(--ink);
  }
  .sw-loading{
    padding: 40px 20px;
    text-align: center;
  }
  .sw-loading-status{
    color: var(--ink-dim);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 24px;
  }
  .sw-loading-status::after{
    content: "...";
    display: inline-block;
    animation: sw-dots 1.4s steps(4, end) infinite;
    width: 1.2em;
    text-align: left;
  }
  .sw-loading-queries{
    margin-top: 10px;
    font-family: ui-monospace, SFMono-Regular, monospace;
    font-size: 10px;
    color: var(--ink-dim);
    opacity: 0.65;
    text-align: center;
    line-height: 1.6;
    letter-spacing: 0;
    text-transform: none;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }
  @keyframes sw-dots{ 0%,100%{content:""} 25%{content:"."} 50%{content:".."} 75%{content:"..."} }
  /* "Did you know" fact card — used both in empty state and loading rotation */
  .sw-fact-wrap{
    max-width: 480px;
    margin: 0 auto;
    text-align: center;
  }
  .sw-fact-eyebrow{
    font-family: ui-monospace, SFMono-Regular, monospace;
    font-size: 10px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 14px;
  }
  .sw-fact-text{
    color: var(--ink);
    font-size: 16px;
    line-height: 1.55;
    margin: 0;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .4s ease, transform .4s ease;
    min-height: 50px;
  }
  .sw-fact-text.show{
    opacity: 1;
    transform: translateY(0);
  }
  /* Agentic-working icon: two nodes + dashed line with flowing dashes */
  .sw-agent-icon{
    display: block;
    margin: 0 auto 18px;
    color: var(--accent);
    overflow: visible;
  }
  .sw-agent-icon .sw-agent-line{
    stroke-dasharray: 4 4;
    animation: sw-agent-flow 0.9s linear infinite;
  }
  .sw-agent-icon .sw-agent-box{
    animation: sw-agent-pulse 1.6s ease-in-out infinite alternate;
  }
  .sw-agent-icon .sw-agent-box.b{
    animation-delay: 0.8s;
  }
  @keyframes sw-agent-flow{
    from { stroke-dashoffset: 0; }
    to   { stroke-dashoffset: -16; }
  }
  @keyframes sw-agent-pulse{
    from { opacity: 0.45; }
    to   { opacity: 1; }
  }
  .sw-eyebrow{
    color: var(--ink-dim);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .sw-reply{
    color: var(--ink);
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    background: #0e1018;
    border: 1px solid #1f2330;
    border-radius: 6px;
    padding: 12px 14px;
    max-height: 360px;
    overflow: auto;
  }
  .sw-reply b, .sw-reply strong{ color: var(--ink); font-weight: 600; }
  .sw-reply .you{
    background: rgba(126, 231, 135, 0.18);
    color: var(--good);
    font-weight: 600;
    padding: 0 3px;
    border-radius: 2px;
  }
  .sw-pctr{ margin-top: 22px; }
  .sw-pctr-table{
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .sw-pctr-table th{
    color: var(--ink-dim);
    font-weight: 500;
    text-align: left;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 6px 8px;
    border-bottom: 1px solid #232838;
  }
  .sw-pctr-table td{
    padding: 8px;
    border-bottom: 1px solid #1c2030;
    color: var(--ink);
    vertical-align: middle;
  }
  .sw-pctr-table tr.you td{ color: var(--good); }
  .sw-pctr-table tr.you td:first-child::before{
    content: "→ ";
    color: var(--good);
  }
  .sw-pctr-table .num{
    font-variant-numeric: tabular-nums;
    text-align: right;
    width: 70px;
    color: var(--ink-dim);
  }
  .sw-pctr-table tr.you .num{ color: var(--good); }
  .sw-pctr-table .bar-cell{ width: 180px; }
  .sw-pctr-bar{
    height: 6px;
    background: var(--accent);
    border-radius: 3px;
    min-width: 2px;
  }
  .sw-pctr-table tr.you .sw-pctr-bar{ background: var(--good); }
  .sw-pctr-bar.estimate{
    background: repeating-linear-gradient(45deg,
      var(--accent) 0 4px, transparent 4px 7px);
    opacity: 0.7;
  }
  .sw-pctr-table tr.you .sw-pctr-bar.estimate{
    background: repeating-linear-gradient(45deg,
      var(--good) 0 4px, transparent 4px 7px);
  }
  .sw-row-note{
    color: var(--ink-dim);
    font-size: 10px;
    margin-left: 8px;
    letter-spacing: 0.04em;
    font-family: ui-monospace, SFMono-Regular, monospace;
  }
  .sw-pctr-table tr.you .sw-row-note{ color: var(--good); opacity: 0.6; }

  /* Natural vs with-brand-context mode toggle */
  .sw-mode-toggle{
    display: inline-flex;
    border: 1px solid #232838;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .sw-mode{
    background: #0e1018;
    border: none;
    color: var(--ink-dim);
    padding: 6px 12px;
    font-size: 11px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .sw-mode:hover{ color: var(--ink); }
  .sw-mode.active{ background: var(--accent); color: #0a0c12; }
  .sw-mode + .sw-mode{ border-left: 1px solid #232838; }
  .sw-mode-note{
    color: var(--ink-dim);
    font-size: 11px;
    font-style: italic;
    margin-bottom: 12px;
    padding: 6px 10px;
    background: rgba(255,255,255,0.02);
    border-left: 2px solid #232838;
  }
  .brand-pill{
    display: inline-block;
    background: rgba(255, 184, 107, 0.15);
    color: var(--accent-2);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 8px;
    font-weight: 500;
  }
  .sim-pill{
    display: inline-block;
    background: rgba(126, 231, 135, 0.15);
    color: var(--good);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 8px;
    font-weight: 500;
  }

  /* Content Sandbox — editable simulated SERP entry for interleaved mode */
  .sw-sandbox{
    margin-bottom: 14px;
    border: 1px solid #1f2330;
    border-radius: 6px;
    background: #0e1018;
  }
  .sw-sandbox summary{
    cursor: pointer;
    padding: 8px 12px;
    color: var(--ink-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    list-style: none;
    user-select: none;
  }
  .sw-sandbox summary::-webkit-details-marker{ display: none; }
  .sw-sandbox summary::before{
    content: "▸";
    display: inline-block;
    margin-right: 8px;
    font-size: 9px;
    transition: transform 0.15s;
  }
  .sw-sandbox[open] summary::before{ transform: rotate(90deg); }
  .sw-sandbox summary:hover{ color: var(--ink); }
  .sw-sandbox-hint{
    color: var(--ink-dim);
    text-transform: none;
    letter-spacing: 0;
    font-size: 10px;
    margin-left: 8px;
    font-style: italic;
  }
  .sw-sandbox-grid{
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 10px 12px;
    padding: 10px 14px 0;
    align-items: center;
  }
  .sw-sandbox-label{
    color: var(--ink-dim);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    align-self: start;
    padding-top: 8px;
  }
  .sw-sandbox-grid input[type="text"],
  .sw-sandbox-grid textarea{
    width: 100%;
    background: var(--bg);
    border: 1px solid #232838;
    border-radius: 4px;
    padding: 6px 10px;
    color: var(--ink);
    font-family: inherit;
    font-size: 12px;
    line-height: 1.5;
    box-sizing: border-box;
    outline: none;
    resize: vertical;
  }
  .sw-sandbox-grid input:focus,
  .sw-sandbox-grid textarea:focus{ border-color: var(--accent); }
  .sw-sandbox-url{
    color: var(--ink);
    font-size: 12px;
    font-family: ui-monospace, SFMono-Regular, monospace;
    padding: 6px 0;
  }
  .sw-sandbox-note{
    color: var(--ink-dim);
    font-style: italic;
    margin-left: 8px;
    font-family: inherit;
    font-size: 11px;
  }
  .sw-sandbox-actions{
    padding: 10px 14px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sw-sandbox-run{
    padding: 6px 14px;
    font-size: 12px;
  }
  .sw-sandbox-status{
    color: var(--ink-dim);
    font-size: 11px;
  }
  .sw-mode[disabled]{ opacity: 0.4; cursor: not-allowed; }

  /* 3-column compare layout — baseline / with-brand / interleaved side by side */
  .sw-compare{
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-top: 6px;
  }
  @media (max-width: 1100px){ .sw-compare{ grid-template-columns: 1fr; } }
  .sw-col{
    background: #0e1018;
    border: 1px solid #1f2330;
    border-radius: 6px;
    padding: 10px 12px;
    /* overflow visible so column-header tooltips can spill beyond the column box */
  }
  .sw-col-head{
    border-bottom: 1px solid #1f2330;
    padding-bottom: 8px;
    margin-bottom: 8px;
  }
  .sw-col-title{
    color: var(--ink);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .sw-col-sub{
    color: var(--ink-dim);
    font-size: 10px;
    font-style: italic;
    margin-top: 2px;
  }
  .sw-col-empty{
    color: var(--ink-dim);
    font-size: 11px;
    font-style: italic;
    padding: 20px 4px;
    text-align: center;
  }
  .sw-table-compact{
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }
  .sw-table-compact thead th{
    color: var(--ink-dim);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
    text-align: left;
    padding: 4px 6px;
    border-bottom: 1px solid #232838;
  }
  .sw-table-compact thead th.num{ text-align: right; }
  .sw-table-compact tbody td{
    padding: 5px 6px;
    border-bottom: 1px solid #1c2030;
    color: var(--ink);
    vertical-align: middle;
  }
  .sw-table-compact tbody td.num{ text-align: right; font-variant-numeric: tabular-nums; }
  .sw-table-compact tbody td.dim{ color: var(--ink-dim); }
  .sw-table-compact tbody tr.you td{ color: var(--good); font-weight: 500; }
  .sw-table-compact tbody tr.sim td{ color: var(--good); font-weight: 500; }
  .sw-table-compact tbody tr.brand-side td{ color: var(--accent-2); }
  .sw-table-compact .sim-pill,
  .sw-table-compact .brand-pill{ margin-left: 4px; font-size: 8px; padding: 0 4px; }
  .sw-table-compact tbody tr{ transition: background .15s; }
  .delta{
    display: inline-block;
    font-family: ui-monospace, SFMono-Regular, monospace;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 3px;
    line-height: 1.4;
  }
  .delta.up   { color: var(--good); background: rgba(126, 231, 135, 0.12); }
  .delta.down { color: var(--bad);  background: rgba(255, 123, 114, 0.12); }
  .delta.new  { color: var(--accent); background: rgba(124, 193, 255, 0.14); }
  .delta.same { color: var(--ink-dim); background: transparent; padding: 1px 2px; }

  /* Composed-ideal column: baseline-query chips + drop zone + custom input */
  .sw-composed-col{ display: flex; flex-direction: column; gap: 12px; }
  .sw-q-section-title{
    color: var(--ink-dim);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .sw-q-list{
    display: flex;

  .sw-q-thumb.down.active{ color: var(--bad); opacity: 1; }
  .sw-q-x{
    background: transparent; border: none;

    font-size: 11px;

    outline: none;
    margin-top: 6px;
  }

  .sw-site-toggle{
    display: block;
    color: var(--ink-dim);
    font-size: 10px;
    cursor: pointer;
    margin-top: 8px;
    user-select: none;
  }
  .sw-site-toggle input{ vertical-align: middle; margin-right: 4px; }
  .sw-site-toggle code{
    background: rgba(255,255,255,0.06);
    padding: 1px 4px;
    font-size: 10px;
    color: var(--accent);
  }
  .sw-site-toggle-hint{
    display: block;
    color: var(--ink-dim);
    font-size: 9px;
    margin-top: 3px;
    opacity: 0.7;
  }
  .sw-composed-actions{ margin: 6px 0 4px; }
  .sw-composed-run{
    background: var(--accent);
    color: #0a0c12;
    border: none;
    border-radius: 4px;
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  .sw-composed-run:disabled{ opacity: 0.4; cursor: not-allowed; }
  .sw-composed-run:hover:not(:disabled){ background: #a3d4ff; }
  .sw-composed-result{ margin-top: 8px; }

  /* Help (?) circle next to each column title with custom tooltip */
  .sw-col-title{ display: flex; align-items: center; gap: 6px; }
  .sw-help{
    display: inline-flex;
    align-items: center; justify-content: center;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    color: var(--ink-dim);
    font-size: 9px;
    font-weight: 600;
    font-family: ui-monospace, SFMono-Regular, monospace;
    cursor: help;
    position: relative;
    user-select: none;
    text-transform: none;
    letter-spacing: 0;
    transition: background .12s, color .12s;
  }
  .sw-help:hover, .sw-help:focus{
    background: var(--accent);
    color: #0a0c12;
    outline: none;
  }
  .sw-help::after{
    content: attr(data-tip);
    position: absolute;
    top: calc(100% + 8px);
    left: -6px;
    width: 280px;
    z-index: 1000;
    background: #0a0c12;
    color: var(--ink);
    font-size: 11px;
    line-height: 1.55;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid #2a3346;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    opacity: 0;
    visibility: hidden;
    transition: opacity .15s, transform .15s;
    transform: translateY(-4px);
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
    font-family: inherit;
    white-space: normal;
    pointer-events: none;
  }
  .sw-help::before{
    content: "";
    position: absolute;
    top: calc(100% + 2px);
    left: 2px;
    border: 5px solid transparent;
    border-bottom-color: #2a3346;
    opacity: 0;
    transition: opacity .15s;
  }
  .sw-help:hover::after, .sw-help:focus::after{
    opacity: 1; visibility: visible; transform: translateY(0);
  }
  .sw-help:hover::before, .sw-help:focus::before{ opacity: 1; }

  /* Per-column body + loading */
  .sw-col-body{ min-height: 80px; }
  .sw-col-loading{ padding: 18px 8px; text-align: center; }
  .sw-col-loading .sw-loading-status{
    color: var(--ink-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 18px;
  }
  .sw-col-loading .sw-loading-status::after{
    content: "...";
    display: inline-block;
    animation: sw-dots 1.4s steps(4, end) infinite;
    width: 1.2em;
    text-align: left;
  }
  .sw-col-loading .sw-fact-wrap{ max-width: 100%; }
  .sw-col-loading .sw-fact-text{ font-size: 13px; }

  /* Per-column footer: AI response preview + Export */
  .sw-col-footer{
    margin-top: 14px;

    line-height: 1.4;
  }
  .sw-col-ai summary::-webkit-details-marker{ display: none; }
  .sw-col-ai summary::before{
    content: "▸ ";
    display: inline-block;
    font-size: 9px;
    margin-right: 4px;
    transition: transform 0.15s;
  }
  .sw-col-ai[open] summary::before{ transform: rotate(90deg); }
  .sw-col-ai summary .lbl{
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-dim);
    font-size: 9px;

  }
  .sw-col-ai summary .preview{
    color: var(--ink);

  }
  .sw-col-ai summary:hover .lbl{ color: var(--ink); }
  .sw-col-ai .sw-reply{
    margin-top: 8px;

    background: var(--bg);

    font-size: 11px;
    line-height: 1.5;
    color: var(--ink);
    white-space: pre-wrap;
    max-height: 240px;
    overflow: auto;
  }
  .sw-col-ai .sw-reply strong{ color: var(--ink); font-weight: 600; }
  .sw-col-ai .sw-reply .sw-cite{
    color: var(--accent); font-size: 9px; margin: 0 1px;
  }
  .sw-col-export{
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 10px;
    font-weight: 600;

    align-self: flex-start;

  /* AI-response thumbs row */
  .sw-ai-thumbs{
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: -4px;
  }
  .sw-ai-thumbs-lbl{
    color: var(--ink-dim);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .sw-ai-thumb{
    background: transparent;
    border: 1px solid #232838;
    border-radius: 4px;
    padding: 2px 8px;
    color: var(--ink-dim);
    cursor: pointer;
    font-size: 12px;
    line-height: 1.4;
    transition: background .12s, border-color .12s, opacity .12s;
    opacity: 0.7;
  }
  .sw-ai-thumb:hover{ opacity: 1; border-color: #2a3346; }
  .sw-ai-thumb.up.active{
    background: rgba(126, 231, 135, 0.12);
    border-color: rgba(126, 231, 135, 0.45);
    opacity: 1;
  }
  .sw-ai-thumb.down.active{
    background: rgba(255, 123, 114, 0.12);
    border-color: rgba(255, 123, 114, 0.45);
    opacity: 1;
  }

  /* Inline content sandbox INSIDE the interleaved column */
  .sw-sandbox-inline{
    background: var(--bg);
    border: 1px solid #1f2330;
    border-radius: 4px;
    padding: 10px 12px;

  .sw-sandbox-inline-title{

  .sw-sandbox-inline input[type="text"],
  .sw-sandbox-inline textarea{
    width: 100%;
    background: #0e1018;

  /* Export button — strong commit signal (legacy, now per-column) */

    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 18px;
    padding: 10px 0;
    border-top: 1px solid #1f2330;

  .sw-export{
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);

    font-weight: 600;

  /* Engagement summary line above the table */

  }

  .sw-ood{
    display: inline-block;

    font-size: 11px;
    background: rgba(255,123,114,0.08);
    border: 1px solid rgba(255,123,114,0.3);
    padding: 4px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
  }

  /* Per-entity sortable table — primary content */
  .sw-table-head{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .sw-cit-toggle{
    color: var(--ink-dim);
    font-size: 11px;
    cursor: pointer;
    user-select: none;
  }
  .sw-cit-toggle input{ vertical-align: middle; margin-right: 4px; }
  .sw-table{
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .sw-table thead th{
    text-align: left;
    color: var(--ink-dim);
    font-size: 10px;

    letter-spacing: 0.08em;

    border-bottom: 1px solid #232838;

    user-select: none;
    white-space: nowrap;
  }
  .sw-table thead th[data-sort-key="_label"]{ cursor: default; }

  .sw-table thead th.sorted{ color: var(--accent); }
  .sw-table thead th.num,
  .sw-table tbody td.num{ text-align: right; font-variant-numeric: tabular-nums; }

  .sw-table tbody td{
    padding: 8px 10px;
    border-bottom: 1px solid #1c2030;
    color: var(--ink);
    vertical-align: middle;
  }
  .sw-table tbody tr{ cursor: pointer; transition: background .12s; }
  .sw-table tbody tr:hover{ background: rgba(255,255,255,0.02); }
  .sw-table tbody tr.you td{ color: var(--good); }
  .sw-table tbody tr.cit td{ color: var(--ink-dim); }
  .sw-table tbody tr.meta-row{ cursor: default; background: rgba(255,255,255,0.02); }
  .sw-table tbody tr.meta-row:hover{ background: rgba(255,255,255,0.02); }
  .sw-table tbody tr.meta-row td{ padding: 12px 14px; border-bottom: 1px solid #232838; }
  .sw-table .lbl{ max-width: 360px; overflow: hidden; text-overflow: ellipsis; }
  .sw-table .rank-pill{
    color: var(--ink-dim);
    font-family: ui-monospace, SFMono-Regular, monospace;

  .sw-table .cit-pill{
    color: var(--ink-dim);
    background: #1c2030;

    letter-spacing: 0.08em;
    margin-right: 6px;

  .sw-table .dim{ color: var(--ink-dim); }
  .sw-cite{
    color: var(--accent);
    font-size: 9px;
    margin: 0 1px;
    cursor: help;
  }
  .meta-panel{ font-size: 12px; line-height: 1.6; }
  .meta-row-line{ margin-bottom: 6px; }
  .meta-row-line b{ color: var(--ink-dim); display: inline-block; min-width: 110px; font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .meta-section{
    background: #0e1018;
    border: 1px solid #1f2330;
    border-radius: 4px;
    padding: 8px 10px;
    color: var(--ink);
    font-family: inherit;
    font-size: 12px;

  }
  .meta-grid .dim{ display: block; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; }

  .sw-products{ display: flex; flex-direction: column; gap: 14px; }
  .sw-products .sw-eyebrow{ margin-bottom: 4px; }

  .sw-prod-ref-label{

    font-family: ui-monospace, SFMono-Regular, monospace;
    font-size: 11px;

  /* Product-context panel above the prompt (session-2 T-B) */
  .context-panel{background:#0e1018;border:1px solid var(--line);border-radius:8px;
    padding:6px 10px;font-size:12px}
  .context-panel summary{cursor:pointer;color:var(--ink-dim);
    display:flex;align-items:center;gap:8px;list-style:none}
  .context-panel summary::-webkit-details-marker{display:none}
  .context-panel summary::before{content:"▸";color:#5b6478;font-size:10px;transition:transform .2s}
  .context-panel[open] summary::before{transform:rotate(90deg)}
  .ctx-summary-text{flex:1;color:var(--ink-dim)}
  .ctx-summary-text .hint{margin-left:4px}
  .ctx-status{font-size:11px;padding:1px 8px;border-radius:999px;background:#1c2535;color:var(--ink-dim)}
  .ctx-status.set{background:#143a18;color:var(--good)}
  .ctx-body{margin-top:8px}
  .ctx-body textarea{width:100%;font-size:13px;background:#0a0c12;
    border:1px solid var(--line);border-radius:6px;padding:8px;resize:vertical}
  .ctx-trend-fit{margin-top:8px;padding:8px 10px;background:#0a1f0d;
    border:1px solid #265c2a;border-radius:6px;color:var(--good);font-size:12px}
  .ctx-trend-fit b{color:var(--ink)}
  .ctx-trend-fit .tf-pill{display:inline-block;background:#143a18;color:var(--good);
    border:1px solid #265c2a;padding:2px 8px;border-radius:999px;margin:2px 4px 2px 0;
    font-size:11px;cursor:pointer}
  .ctx-trend-fit .tf-pill:hover{background:#1d5c25}
  /* Outcome strip — bible's edit-to-outcome USP made literal.
     Sticky on scroll so the operator's bottom-line numbers are always visible
     while they edit, swap brands, attach sales below. */
  .outcome-strip{position:sticky;top:0;z-index:30;
    display:flex;gap:14px;flex-wrap:wrap;align-items:center;
    padding:10px 14px;background:linear-gradient(90deg,#0a1f0d,#0e1018);
    border:1px solid #265c2a;border-radius:8px;margin:8px 0;font-size:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.4)}
  .outcome-strip .o-stat{display:flex;flex-direction:column;gap:2px}
  .outcome-strip .o-label{color:var(--ink-dim);font-size:10px;letter-spacing:.04em;text-transform:uppercase}
  .outcome-strip .o-value{color:var(--good);font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
  .outcome-strip .o-value.warn{color:var(--accent-2)}
  .outcome-strip .o-detail{color:var(--ink-dim);font-size:10px}
  .outcome-strip .o-attribution{margin-left:auto;color:var(--ink-dim);font-size:11px;font-style:italic;max-width:280px;text-align:right}
  /* Side-by-side compare pair (session-3 T-C) */
  .compare-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px;
    background:#0a0c12;border:1px solid var(--accent);border-radius:8px;padding:10px;margin:8px 0}
  .compare-pair .cp-col{background:#0e1018;border-radius:6px;padding:10px;font-size:12px}
  .compare-pair .cp-col.ctrl{border-left:3px solid #5b6478}
  .compare-pair .cp-col.with{border-left:3px solid var(--good)}
  .compare-pair .cp-head{font-weight:600;color:var(--ink-dim);font-size:11px;
    letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;display:flex;justify-content:space-between}
  .compare-pair .cp-col.with .cp-head{color:var(--good)}
  .compare-pair .cp-body{white-space:pre-wrap;color:var(--ink);font-size:12px;line-height:1.4;
    max-height:300px;overflow:auto}
  .compare-pair .cp-stats{margin-top:8px;font-size:11px;color:var(--ink-dim);display:flex;gap:8px;flex-wrap:wrap}
  .compare-pair .cp-stats b{color:var(--ink);font-variant-numeric:tabular-nums}
  .compare-pair .cp-skel{color:#5b6478;font-style:italic;animation:cp-pulse 1.4s ease-in-out infinite}
  @keyframes cp-pulse{0%,100%{opacity:.6}50%{opacity:1}}
  .compare-pair .cp-diff{grid-column:1/-1;background:#1a160a;border:1px solid #2c2614;
    border-radius:6px;padding:6px 10px;color:var(--accent-2);font-size:11px}
  .compare-pair .cp-diff b{color:var(--ink)}
  /* Turns thread (session-2 T-A: ongoing conversation) */
  .turns{display:flex;flex-direction:column;gap:10px;max-height:560px;overflow-y:auto}
  .turn{background:#0a0c12;border:1px solid var(--line);border-radius:8px;padding:10px 12px}
  .turn.you{border-left:3px solid var(--accent)}
  .turn.ai{border-left:3px solid var(--good)}
  .turn-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:11px;color:var(--ink-dim)}
  .turn-head .who{text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .turn-head .who.you{color:var(--accent)}
  .turn-head .who.ai{color:var(--good)}
  .turn-prompt{color:var(--ink);font-size:13px;line-height:1.45;white-space:pre-wrap}
  .turn-context{margin-top:4px;padding:4px 8px;border-radius:4px;background:#1a160a;
    border:1px solid #2c2614;color:#dcb78a;font-size:10px}
  .turn-context::before{content:"with context: ";color:var(--accent-2)}
  .turn-ai{margin-top:6px;background:transparent;padding:0}
  .turn-stats{margin-top:6px;font-size:11px;color:var(--ink-dim);display:flex;gap:10px;flex-wrap:wrap}
  .turn-stats b{color:var(--ink);font-variant-numeric:tabular-nums}
  .turn-actions{margin-top:6px;display:flex;gap:6px}
  .turn-actions button{font-size:11px;padding:3px 8px}
  .ctx-nudge{margin-top:8px;padding:6px 10px;background:#1a160a;border:1px solid #2c2614;
    border-radius:6px;color:var(--accent-2);font-size:11px}
  .ctx-nudge b{color:var(--ink)}
  .turn-diff{font-size:10px;color:var(--ink-dim);margin-left:8px;font-weight:400;text-transform:none;letter-spacing:0}
  /* Intent chip row that pops below a swapped brand pill */
  .intent-chip-row{display:inline-flex;align-items:center;gap:4px;margin-left:6px;
    background:#0e1018;border:1px solid var(--line);border-radius:6px;padding:3px 6px;
    font-size:10px;animation:cp-pulse 2s ease-in-out infinite}
  .intent-chip-row .ic{font-size:10px;background:#1c2535;color:var(--ink-dim);
    border:1px solid #2a3346;border-radius:4px;padding:2px 8px;cursor:pointer}
  .intent-chip-row .ic:hover{background:#16243a;color:var(--accent);border-color:var(--accent)}
  .intent-chip-row .ic-skip{color:#5b6478;border-color:#1f2533;background:transparent}
  .prev-expand{font-size:10px;background:transparent;border:none;color:var(--accent);
    cursor:pointer;padding:0;text-decoration:underline}
  /* Hero band: prompt-as-hero per session-1 finding T3. */
  .hero{padding:18px 20px 8px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#0e1018,var(--bg))}
  .hero-inner{max-width:1180px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
  .hero-label{color:var(--ink-dim);font-size:12px;letter-spacing:.04em;text-transform:uppercase}
  .hero textarea{width:100%;min-height:64px;font-size:15px;line-height:1.45;
    background:#0e1018;border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .hero textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(124,193,255,.2)}
  .hero-row{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
  .hero-chips{display:inline-flex;gap:4px;flex-wrap:wrap}
  .hero-chips .h-chip{font-size:11px;padding:3px 9px;border-radius:999px;
    background:#1c2535;border:1px solid #2a3346;color:var(--ink-dim);cursor:pointer}
  .hero-chips .h-chip:hover{color:var(--accent);border-color:var(--accent)}
  .hero-actions{display:inline-flex;gap:6px}
  #hero-context{color:var(--ink-dim);font-size:12px}
  #hero-context b{color:var(--accent);font-weight:600}
  .real-toggle{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;
    border:1px solid var(--line);border-radius:6px;font-size:11px;color:var(--ink-dim);cursor:pointer}
  .real-toggle:has(input:checked){color:var(--good);border-color:var(--good)}
  .real-toggle input{margin:0}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px}
  .panel h2{margin:0 0 8px;font-size:12px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--ink-dim);font-weight:600}
  #move-tag{font-size:10px;color:var(--accent);margin-left:6px}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
  .toggle-pill{display:inline-flex;align-items:center;gap:4px;color:var(--ink-dim);
    font-size:12px;padding:2px 8px;border:1px solid var(--line);border-radius:6px;cursor:pointer}
  .toggle-pill:has(input:checked){color:var(--accent);border-color:var(--accent)}
  .toggle-pill input{margin:0}
  .chart-mode{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .chart-mode button{background:#0e1018;border:none;color:var(--ink-dim);
    font-size:11px;padding:3px 8px;cursor:pointer}
  .chart-mode button.active{background:var(--accent);color:#0a0c12}
  .trend-match{margin:8px 0;padding:8px 10px;background:#0a1f0d;border:1px solid #265c2a;
    border-radius:6px;color:var(--good);font-size:12px}
  .trend-match b{color:var(--ink)}
  select,input,button,textarea{background:#0e1018;color:var(--ink);
    border:1px solid var(--line);border-radius:6px;padding:6px 10px;
    font:inherit}
  button{cursor:pointer;background:#1f2533}
  button:hover{background:#283044}
  button.primary{background:#1d4f8e;border-color:#2a6cc4}
  button.primary:hover{background:#266ab9}
  textarea{width:100%;min-height:80px;resize:vertical;font-family:inherit}
  .row{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
  .row > *{flex:1 1 auto}
  .grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
    gap:6px;max-height:340px;overflow:auto;padding-right:6px}
  .card{background:#0e1018;border:1px solid var(--line);border-radius:6px;
    padding:8px 10px;cursor:pointer;font-size:12px;line-height:1.4;
    transition:background .12s,border-color .12s}
  .card:hover{background:#161a26;border-color:#3a4258}
  .card.sel{border-color:var(--accent);background:#16243a}
  .card.revisited::after{content:"↻";position:absolute;top:4px;right:6px;
    color:var(--accent-2);font-size:11px}
  .card{position:relative}
  .card .kw{color:var(--ink);font-weight:600}
  .card .met{color:var(--ink-dim);display:flex;justify-content:space-between;
    margin-top:3px}
  .card .met span{font-variant-numeric:tabular-nums}
  .badge{display:inline-block;padding:1px 6px;border-radius:6px;
    font-size:10px;background:#2a3346;color:#bfd0ee;margin-left:4px}
  .badge.product{background:#3b2a46;color:#dcb8f0}
  .trend{display:inline-block;margin-left:4px;font-size:10px;font-weight:700}
  .trend.up{color:var(--good)}
  .trend.dn{color:var(--bad)}
  pre.ai, div.ai{white-space:pre-wrap;background:#0a0c12;padding:10px;border-radius:6px;
    border:1px solid var(--line);max-height:340px;overflow:auto;font-size:13px}
  div.ai .brand-pill{display:inline-block;background:#16243a;border:1px solid #2a4a6e;
    color:var(--accent);padding:1px 8px;border-radius:6px;cursor:pointer;
    font-weight:600;margin:0 1px;transition:background .12s}
  div.ai .brand-pill:hover{background:#1d3454;border-color:var(--accent)}
  div.ai .brand-pill.user-added{background:#0e1a10;border-color:#5c8a3d;color:var(--good)}
  div.ai .brand-pill.removed{text-decoration:line-through;opacity:.5;background:#3a1414;border-color:#6e3030;color:var(--bad)}
  div.ai .insert-slot{display:inline-block;width:14px;height:14px;border-radius:50%;
    background:transparent;color:#5b6478;cursor:pointer;font-size:11px;line-height:14px;
    text-align:center;margin:0 1px;opacity:0;transition:opacity .15s,background .15s,color .15s}
  div.ai:hover .insert-slot{opacity:.7}
  div.ai .insert-slot:hover{opacity:1;background:var(--good);color:#0a0c12}
  div.ai .brand-pop{position:absolute;background:#0e1018;border:1px solid var(--accent);
    border-radius:6px;padding:6px;box-shadow:0 4px 14px rgba(0,0,0,.5);z-index:50;
    display:flex;gap:4px;align-items:center}
  div.ai .brand-pop input{font-size:12px;background:#0a0c12;border:1px solid var(--line);
    color:var(--ink);padding:3px 8px;border-radius:4px;min-width:200px}
  div.ai .brand-pop button{font-size:11px;padding:3px 8px}
  .meta-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px 10px;
    font-size:12px;color:var(--ink-dim)}
  .meta-grid b{color:var(--ink);font-variant-numeric:tabular-nums}
  .pred{display:flex;gap:8px;align-items:center;margin-top:6px;
    color:var(--ink-dim);font-size:12px}
  .pred .num{color:var(--good);font-weight:600}
  .pred .num.bad{color:var(--bad)}
  .best-badge{display:inline-block;margin-top:4px;padding:2px 8px;border-radius:6px;
    background:#143a18;color:var(--good);font-size:11px;font-weight:600}
  .best-badge.pos{background:#143a18;color:var(--good)}
  .best-badge.neg{background:#3a1414;color:var(--bad)}
  .tip{margin-top:4px;color:var(--accent-2);font-size:11px;font-style:italic}
  #chart-wrap{height:240px;position:relative}
  #chart{width:100%;height:100%}
  .tweak-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .tweak-row button{font-size:12px;padding:4px 10px;display:inline-flex;align-items:center;gap:6px}
  .tweak-row button .d{font-size:10px;padding:1px 6px;border-radius:999px;
    background:#1c2535;color:var(--ink-dim);font-variant-numeric:tabular-nums;min-width:30px;text-align:center}
  .tweak-row button .d.pos{background:#143a18;color:var(--good)}
  .tweak-row button .d.neg{background:#3a1414;color:var(--bad)}
  .tweak-row button[data-kind].best{outline:1px solid var(--good);outline-offset:1px}
  .my-prompts{font-size:11px;max-height:240px;overflow:auto;
    background:#0a0c12;border:1px solid var(--line);border-radius:6px;padding:6px 8px}
  .prefs,.my-brands{font-size:11px;background:#0a0c12;border:1px solid var(--line);border-radius:6px;
    padding:6px 8px;max-height:200px;overflow:auto}
  .brand-row{padding:4px 0;border-bottom:1px dashed #1f2533;display:grid;
    grid-template-columns:1fr 60px 60px 60px 90px;gap:6px;align-items:center;font-size:11px}
  .brand-ask{font-size:10px;padding:3px 8px;background:#143a18;color:var(--good);
    border:1px solid #265c2a;border-radius:6px;cursor:pointer}
  .brand-ask:hover{background:#1d5c25}
  .brand-row .b-name{color:var(--good);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .brand-row .b-num{color:var(--ink-dim);text-align:right;font-variant-numeric:tabular-nums}
  .brand-row .b-clusters{grid-column:1 / -1;color:var(--ink-dim);font-size:10px;
    margin-top:2px;display:flex;flex-wrap:wrap;gap:2px}
  .brand-row .b-clusters span{background:#1c2535;padding:1px 5px;border-radius:4px}
  .pref-row{padding:3px 0;border-bottom:1px dashed #1f2533;display:flex;gap:6px;align-items:center}
  .pref-row .arr{color:var(--accent-2)}
  .pref-row .removed{color:#7a8294;text-decoration:line-through}
  .pref-row .inserted{color:var(--good);font-weight:600}
  .pref-row .pkw{color:var(--ink-dim);margin-left:auto;font-size:10px}
  .mp-row{display:grid;grid-template-columns:62px 1fr 60px 60px 70px;gap:6px;
    padding:3px 4px;border-bottom:1px dashed #1f2533;align-items:center;cursor:pointer}
  .mp-cmp-wrap{display:inline-flex;align-items:center;gap:3px;font-size:10px;
    color:var(--ink-dim);cursor:pointer}
  .mp-cmp-wrap:has(input:checked){color:var(--accent)}
  .mp-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:4px;margin-left:2px;
    letter-spacing:.04em;text-transform:uppercase;font-weight:600}
  .mp-badge.regen{background:#241b13;color:var(--accent-2);border:1px solid #3e2f15}
  .mp-badge.ctx{background:#10243a;color:var(--accent);border:1px solid #2a4a6e}
  .mp-badge.real{background:#0e1a10;color:var(--good);border:1px solid #265c2a}
  .compare-box{margin-top:6px;background:#10131c;border:1px solid var(--accent);
    border-radius:6px;padding:8px}
  .cmp-grid{display:grid;grid-template-columns:1fr 24px 1fr;gap:8px;align-items:center}
  .cmp-cell{background:#0a0c12;border:1px solid var(--line);border-radius:6px;padding:6px 8px}
  .cmp-prompt{color:var(--ink);font-size:11px;line-height:1.35;max-height:60px;overflow:auto}
  .cmp-stats{margin-top:4px;color:var(--ink-dim);font-size:11px;font-variant-numeric:tabular-nums}
  .cmp-vs{text-align:center;color:var(--accent-2);font-weight:700}
  .cmp-deltas{margin-top:6px;font-size:11px;color:var(--ink-dim);text-align:center;
    font-variant-numeric:tabular-nums}
  .mp-row:hover{background:#10131c}
  .mp-row .mp-prompt{color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mp-row .mp-kw{color:var(--ink-dim);font-size:10px}
  .mp-improve{background:transparent;border:none;cursor:pointer;font-size:11px;
    padding:0 2px;color:var(--accent-2);margin-left:4px}
  .mp-improve:hover{color:var(--accent)}
  .mp-row .num{font-variant-numeric:tabular-nums;text-align:right}
  .events{font-size:11px;color:var(--ink-dim);max-height:200px;overflow:auto;
    background:#0a0c12;border:1px solid var(--line);border-radius:6px;padding:8px}
  .events .ev{display:flex;gap:6px;margin-bottom:2px;font-variant-numeric:tabular-nums}
  .events .mt{color:var(--accent);min-width:130px}
  .hint{color:var(--ink-dim);font-size:12px;margin:6px 0 0}
  .splitlabel{font-size:11px;color:var(--ink-dim);margin:6px 0 4px;
    letter-spacing:.04em;text-transform:uppercase}
  .pad-l{padding-left:8px;border-left:2px solid #333a4d}
  .footer{padding:6px 20px 16px;color:var(--ink-dim);font-size:11px}
  details{margin-top:8px}
  details > summary{cursor:pointer;color:var(--ink-dim);font-size:12px}
  .delta{font-variant-numeric:tabular-nums;font-weight:600}
  .delta.pos{color:var(--good)} .delta.neg{color:var(--bad)}
  .similar-pill{display:inline-block;background:#1c2535;border:1px solid #2a3346;
    padding:2px 8px;border-radius:999px;font-size:11px;margin:2px 4px 2px 0;cursor:pointer}
  .similar-pill:hover{background:#26334a}
  /* Next-best-action chip (PM agent fix: replaces gamified tier ladder) */
  .next-action{padding:8px 20px;background:#1a160a;border-bottom:1px solid #2c2614;
    display:flex;gap:10px;align-items:center;font-size:12px;color:var(--accent-2)}
  .next-action b{color:var(--ink)}
  .next-action button{background:var(--accent-2);color:#1a1109;border:none;
    padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer}
  .next-action button:hover{background:#ffd089}
  .next-action .nb-dismiss{background:transparent;color:var(--ink-dim);border:1px solid var(--line);
    margin-left:auto;font-weight:400;font-size:10px}
  /* Value strip — what your activity tells you about your positioning */
  .value-strip{padding:8px 20px;background:#0a1f0d;border-bottom:1px solid #265c2a;
    display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--ink-dim)}
  .value-strip .v-stat{display:flex;align-items:center;gap:4px}
  .value-strip b{color:var(--good);font-variant-numeric:tabular-nums}
  .value-strip .v-money{color:var(--accent)}
  .value-strip .v-money b{color:var(--accent)}
  .rec-row{display:grid;grid-template-columns:24px 1fr 80px 60px 90px 60px;
    gap:6px;padding:3px 6px;border-bottom:1px dashed #1f2533;font-size:12px;align-items:center}
  .rec-row:hover{background:#10131c}
  .rec-rank{color:var(--ink-dim);font-variant-numeric:tabular-nums}
  .rec-name{color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rec-pctr,.rec-price,.rec-ev{color:var(--ink-dim);font-variant-numeric:tabular-nums;text-align:right}
  .rec-pctr b,.rec-ev b{color:var(--good)}
  .rec-plat{color:#8595aa;font-size:10px;text-align:right}
  /* Sales extraction preview */
  .sales-preview-table{margin-top:8px;background:#0a0c12;border:1px solid var(--line);
    border-radius:6px;overflow:hidden;font-size:11px}
  .sales-preview-table .row-head, .sales-preview-table .row-data{
    display:grid;grid-template-columns:24px 2fr 60px 80px 90px 90px;gap:4px;padding:4px 8px;align-items:center}
  .sales-preview-table .row-head{background:#10131c;color:var(--ink-dim);font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.04em}
  .sales-preview-table .row-data{border-top:1px dashed #1f2533}
  .sales-preview-table .row-data.dropped{opacity:.4;text-decoration:line-through}
  .sales-preview-table .row-data input{font-size:11px;background:#0e1018;border:1px solid var(--line);color:var(--ink);padding:2px 6px;border-radius:4px;width:100%}
  .sales-preview-table .keep{accent-color:var(--good)}
  .sales-preview-summary{margin-top:6px;display:flex;gap:8px;align-items:center;font-size:11px;color:var(--ink-dim)}
  /* Sales drag-drop zone */
  .sales-drop{margin-top:6px;padding:14px;border:2px dashed #2a3346;border-radius:8px;
    background:#0e1018;text-align:center;transition:border-color .2s,background .2s}
  .sales-drop.drag{border-color:var(--good);background:#0e1a10}
  .sales-drop .sd-cta{color:var(--ink);font-size:13px;font-weight:600}
  .sales-drop .sd-hint{color:var(--ink-dim);font-size:11px;margin-top:4px}
  .sales-drop .sd-privacy{
    color:var(--ink-dim); font-size:11px; line-height:1.5;
    margin-top:8px; padding:8px 10px;
    border-left:2px solid #2a3346; background:rgba(255,255,255,0.02);
  }
  .sales-drop .sd-privacy b{color:var(--ink); font-weight:600}
  .sales-drop .sd-privacy code{
    font-family:ui-monospace,monospace;
    background:rgba(255,255,255,0.04); padding:1px 4px; font-size:10px;
  }
  .sales-drop .row{justify-content:center}
  /* Forecast strip */
  .forecast-strip{margin-top:6px;padding:8px 10px;border-radius:6px;
    background:linear-gradient(90deg,#0a1f0d,#0e1018);border:1px solid #265c2a;
    font-size:11px;color:var(--ink-dim);display:flex;flex-direction:column;gap:4px}
  .forecast-strip .fc-title{color:var(--good);font-weight:600}
  .forecast-bar{position:relative;height:14px;background:#1c2535;border-radius:6px;overflow:hidden}
  .forecast-bar > .iqr{position:absolute;top:0;height:100%;background:rgba(125,232,135,.35)}
  .forecast-bar > .median{position:absolute;top:0;height:100%;width:2px;background:var(--good)}
  .forecast-bar > .marker{position:absolute;top:0;height:100%;width:2px;background:var(--accent-2)}
  /* Per-cluster engagement chip row */
  .my-cluster-stats{display:flex;gap:6px;flex-wrap:wrap;margin:4px 0;font-size:11px}
  .my-cluster-stats .chip{background:#1c2535;border:1px solid #2a3346;
    border-radius:999px;padding:2px 8px;color:var(--ink-dim)}
  .my-cluster-stats .chip b{color:var(--ink);margin-right:2px;font-variant-numeric:tabular-nums}
  .my-cluster-stats .chip.hot{background:#143a18;border-color:#265c2a;color:var(--good)}
  /* Move 3 prompt picks */
  .prompt-picks{display:inline-flex;gap:4px;margin-left:8px}
  .prompt-picks .pick{font-size:10px;padding:1px 6px;border-radius:999px;
    background:#1c2535;border:1px solid #2a3346;color:var(--ink-dim);cursor:pointer;
    text-transform:none;letter-spacing:0;font-weight:400}
  .prompt-picks .pick:hover{color:var(--accent);border-color:var(--accent)}
  /* Cluster brands aggregated bar */
  .agg-row{display:grid;grid-template-columns:1fr 80px 60px;gap:6px;
    padding:2px 4px;font-size:11px;align-items:center}
  .agg-row .agg-bar{height:5px;background:#1c2535;border-radius:3px;position:relative;overflow:hidden}
  .agg-row .agg-bar i{position:absolute;left:0;top:0;height:100%;background:var(--accent)}
  .agg-row .agg-name{color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    font-size:11px}
  .agg-row .agg-name.match{color:var(--good)}
  .agg-row .agg-num{color:var(--ink-dim);text-align:right;font-variant-numeric:tabular-nums;font-size:10px}
  /* Source-tag chips (session-2 T-C: my-data vs dataset distinction) */
  .src-tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:999px;
    margin-left:6px;letter-spacing:.04em;text-transform:uppercase;font-weight:700}
  .src-tag.dataset{background:#10243a;color:var(--accent);border:1px solid #2a4a6e}
  .src-tag.mine{background:#0e1a10;color:var(--good);border:1px solid #265c2a}
  /* Subtle color cue on the column itself */
  .mm-col.data-dataset{border-left:2px solid #2a4a6e}
  .mm-col.data-mine{border-left:2px solid #265c2a}
  /* Move 2 mismatch */
  .mismatch{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
  .mm-col{background:#0a0c12;border:1px solid var(--line);border-radius:6px;padding:8px}
  .truth-row{display:grid;grid-template-columns:1fr 70px 70px;gap:6px;
    padding:3px 4px;border-bottom:1px dashed #1f2533;font-size:12px;align-items:center}
  .truth-row.match{background:#0e1a10}
  .truth-empty{color:#7a8294;font-size:11px;font-style:italic}
  .truth-summary{color:var(--ink-dim);font-size:11px;margin-bottom:4px;display:flex;justify-content:space-between}
  .truth-summary b{color:var(--good);font-variant-numeric:tabular-nums}
  .convergence{display:inline-block;background:#143a18;color:var(--good);
    border-radius:4px;padding:1px 5px;font-size:10px;margin-left:4px}
  /* Prompt axes */
  #axes-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;font-size:12px;
    color:var(--ink-dim);background:#0a0c12;border:1px solid var(--line);
    border-radius:6px;padding:8px 10px}
  .axis-row{display:grid;grid-template-columns:90px 1fr 60px;gap:6px;align-items:center}
  .axis-bar{height:6px;background:#1c2535;border-radius:3px;position:relative;overflow:hidden}
  .axis-bar > i{position:absolute;left:0;top:0;height:100%;background:var(--accent);transition:width .25s}
  .axis-bar > i.warn{background:var(--accent-2)}
  .axis-val{text-align:right;font-variant-numeric:tabular-nums;color:var(--ink)}
  .axis-flag{display:inline-flex;align-items:center;gap:4px;font-size:11px;
    background:#1c2535;border:1px solid #2a3346;border-radius:4px;padding:1px 6px}
  .axis-flag.on{background:#143a18;border-color:#265c2a;color:var(--good)}
  .axis-flag.off{color:var(--ink-dim)}
  .axis-nearest{grid-column:1/-1;color:var(--ink-dim);font-size:11px;font-style:italic;
    border-top:1px dashed #1f2533;margin-top:4px;padding-top:4px}
  /* Move 5 editor */
  ol.rec-list{list-style:none;padding:0;margin:0}
  ol.rec-list li{display:grid;grid-template-columns:18px 18px 1fr 60px 18px;
    gap:6px;align-items:center;background:#0e1018;border:1px solid var(--line);
    border-radius:6px;padding:6px 8px;margin:4px 0;cursor:grab;font-size:13px;
    transition:transform .12s,box-shadow .12s,border-color .12s}
  ol.rec-list li:hover{border-color:#3a4258}
  ol.rec-list li.dragging{opacity:.45;cursor:grabbing}
  ol.rec-list li.drop-above{box-shadow:0 -2px 0 var(--accent) inset}
  ol.rec-list li.drop-below{box-shadow:0 2px 0 var(--accent) inset}
  ol.rec-list li.user-added{border-color:#5c8a3d;background:#101a10}
  ol.rec-list .rk{color:var(--ink-dim);font-variant-numeric:tabular-nums;text-align:right}
  ol.rec-list .grip{color:#5b6478;font-size:14px;line-height:1;user-select:none}
  ol.rec-list .nm{color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  ol.rec-list .pc{color:var(--good);text-align:right;font-variant-numeric:tabular-nums;font-size:11px}
  ol.rec-list .x{background:transparent;border:none;color:#7a8294;cursor:pointer;padding:0;font-size:14px}
  ol.rec-list .x:hover{color:var(--bad)}
  #rec-pred-status{margin-top:8px;display:flex;flex-direction:column;gap:2px}
  #rec-suggest{position:absolute;top:100%;left:0;right:96px;background:#0e1018;
    border:1px solid var(--line);border-radius:6px;margin-top:2px;z-index:10;
    max-height:180px;overflow:auto;box-shadow:0 4px 12px rgba(0,0,0,.4)}
  #rec-suggest .sugg{padding:6px 10px;font-size:12px;cursor:pointer;color:var(--ink-dim);
    border-bottom:1px dashed #1f2533}
  #rec-suggest .sugg:hover, #rec-suggest .sugg.hl{background:#16243a;color:var(--ink)}
  #rec-suggest .sugg b{color:var(--accent)}
</style>

<body>

<main>
  <!-- SIMPLE TAB v6 — prompt investigation workbench -->
  <section class="panel tab-panel" data-tab-panel="simple">
    <div class="simple-workbench">
      <div class="sw-grid">
        <!-- LEFT PANEL: prompt GUI -->
        <aside class="sw-left">
          <div class="sw-field">
            <label class="sw-label" for="sw-prompt">Prompt <span class="sw-counter" id="sw-prompt-counter">0 / 5000</span></label>
            <textarea id="sw-prompt" rows="5" maxlength="5000" placeholder="the customer query you want to investigate — e.g. best niacinamide serum for sensitive skin"></textarea>
          </div>
          <div class="sw-field">
            <label class="sw-label" for="sw-brand">Brand</label>
