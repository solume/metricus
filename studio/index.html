<script>
// Metricus Studio — sole client. All pipeline + telemetry goes to hosted workers.
'use strict';

const STATE = {
  keywords: [], filtered: [], selected: null,
  lastPrompt: "", lastAI: "", lastPromptId: null, lastPredPctr: null,
  hoverTimer: null, hoverStart: null, hoverKw: null,
};

const SW_LOGS_URL = "https://metricus-studio-logs.red-hill-a87d.workers.dev/";
const SW_UID = (() => {
  let u = localStorage.getItem("metricus_uid");
  if (!u) {
    u = (crypto.randomUUID && crypto.randomUUID()) ||
        ("uid-" + Math.random().toString(36).slice(2) + Date.now().toString(36));
    localStorage.setItem("metricus_uid", u);
  }
  return u;
})();
const SW_SID = (crypto.randomUUID && crypto.randomUUID()) ||
               ("sid-" + Math.random().toString(36).slice(2) + Date.now().toString(36));
function swLog(event, value) {
  // fire-and-forget POST to the studio logs worker
  try {
    fetch(SW_LOGS_URL, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ uid: SW_UID, sid: SW_SID, event, value: value ?? null }),
      keepalive: true,
    }).catch(() => {});
  } catch {}
}

function fmt(n, d=2) {
  if (n === null || n === undefined || isNaN(n)) return "—";
  if (Math.abs(n) >= 1000) return n.toLocaleString(undefined,{maximumFractionDigits:0});
  return Number(n).toFixed(d);
}

function escapeHtml(s){return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

const SW_FACTS = [
  "Tip: paste a product URL into the Brand field — Metricus auto-scrapes JSON-LD, page title, and meta description.",
  "Tip: click any recommendation card to expand its bullets and read the AI's reasoning.",
  "Tip: after a run, click ▸ Brand context at the top of the result to edit what we sent to the AI without re-scraping.",
  "Tip: the colored bar is the predicted CTR; the small gray tick behind it is the smoothed category average.",
  "Tip: leave the Brand field blank to see the generic AI answer with no context injected.",
  "Tip: ⌘ + Enter runs your prompt — no need to reach for the mouse.",
  "Tip: every result is matched against a category cluster — see which one in the eyebrow above the cards.",
  "Tip: the prompt counter turns orange near 4,500 chars and red at 5,000 — Metricus caps prompts at 5,000.",
  "Tip: the full AI response is collapsed under ▸ Show full AI response — products are the headline, prose is the appendix.",
];

const SW_AGENT_ICON_HTML = `
  <svg class="sw-agent-icon" viewBox="0 0 80 24" width="80" height="24" aria-hidden="true">
    <rect class="sw-agent-box a" x="2" y="6" width="12" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <rect class="sw-agent-box b" x="66" y="6" width="12" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <line class="sw-agent-line" x1="14" y1="12" x2="66" y2="12" stroke="currentColor" stroke-width="1.5"/>
  </svg>
`;

function swPickFacts(n) {
  return [...SW_FACTS].sort(() => Math.random() - 0.5).slice(0, n);
}

function _swBrandHue(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffff;
  return h % 360;
}

function _swBaselineRankMap() {
  const map = new Map();
  for (const e of (STATE._modeBaseline?.final || [])) {
    if (e.type === "rec") map.set((e.brand || "").toLowerCase(), e.rank);
  }
  return map;
}

function swRenderTableCompact(final, colKey) {
  if (!final || !final.length) {
    return `<div class="sw-col-empty">no recommendations</div>`;
  }
  const brandLower = (STATE._lastBrand || "").toLowerCase().trim();
  const recs = final.filter(e => e.type === "rec");
  const sorted = [...recs].sort((a, b) => (a.rank ?? 999) - (b.rank ?? 999));
  const baseMap = colKey === "baseline" ? null : _swBaselineRankMap();
  return `<table class="sw-table-compact">
    <thead><tr>
      <th class="num">#</th>
      ${colKey === "baseline" ? "" : '<th class="num">Δ</th>'}
      <th>entity</th>
      <th class="num">CTR%</th><th class="num">CVR%</th><th class="num">eng/1k</th>
    </tr></thead>
    <tbody>${sorted.map(r => {
      const nameLower = (r.brand || "").toLowerCase();
      const isYou = brandLower && nameLower.includes(brandLower);
      const cls = [isYou ? "you" : "", r._simulated ? "sim" : "", r._brand_side ? "brand-side" : ""].filter(Boolean).join(" ");
      const pills = (r._simulated ? '<span class="sim-pill">sim</span>' : "")
                  + (r._brand_side ? '<span class="brand-pill">brand</span>' : "");
      // Per-brand color stripe — same hue across all 3 columns for same brand
      const hue = _swBrandHue(nameLower);
      const stripe = `border-left: 3px solid hsl(${hue}, 50%, 55%)`;
      // Rank-delta badge for non-baseline columns
      let deltaCell = "";
      if (baseMap) {
        const baseRank = baseMap.get(nameLower);
        let badge;
        if (baseRank == null) badge = `<span class="delta new">NEW</span>`;
        else if (baseRank > r.rank) badge = `<span class="delta up">↑${baseRank - r.rank}</span>`;
        else if (baseRank < r.rank) badge = `<span class="delta down">↓${r.rank - baseRank}</span>`;
        else                        badge = `<span class="delta same">—</span>`;
        deltaCell = `<td class="num">${badge}</td>`;
      }
      return `<tr class="${cls}" style="${stripe}">
        <td class="num dim">${r.rank}</td>
        ${deltaCell}
        <td>${escapeHtml(r.brand || "")}${pills}</td>
        <td class="num">${r.E_ctr_pct?.toFixed?.(2) ?? "—"}</td>
        <td class="num">${r.E_cvr_pct?.toFixed?.(2) ?? "—"}</td>
        <td class="num">${r.E_engagement?.toFixed?.(3) ?? "—"}</td>
      </tr>`;
    }).join("")}</tbody>
  </table>`;
}

function _swCurrentBrandDomain() {
  // Re-derive on every render so toggle reflects whatever's in the Brand field
  // *right now*, not what was cached at pipeline-run time.
  const raw = (document.getElementById("sw-brand")?.value || "").trim();
  const m = raw.match(
    /(?:https?:\/\/)?(?:www\.)?([a-z0-9][a-z0-9-]*(?:\.[a-z0-9-]+)*\.[a-z]{2,})/i
  );
  return m ? m[1].toLowerCase() : "";
}

function swRenderComposedColumn() {
  const baseline = STATE._lastBaselineQueries || [];
  const cs = STATE._composedState || (STATE._composedState = {
    composed: [],
    siteToggle: false,
    customInput: "",
    thumbs: {},
  });
  const baselineChips = baseline.length ? baseline.map(q => {
    const t = cs.thumbs[q];
    const chosen = cs.composed.includes(q);
    return `<div class="sw-q-chip${chosen ? " chosen" : ""}" draggable="true" data-q="${escapeHtml(q)}">
      <span class="sw-q-text">${escapeHtml(q)}</span>
      <button class="sw-q-thumb up${t === "up" ? " active" : ""}" data-thumb="up" title="👍 useful query">👍</button>
      <button class="sw-q-thumb down${t === "down" ? " active" : ""}" data-thumb="down" title="👎 unhelpful">👎</button>
    </div>`;
  }).join("") : `<div class="sw-q-empty">no queries yet</div>`;
  const composedChips = cs.composed.length ? cs.composed.map(q =>
    `<div class="sw-q-chip composed" data-q="${escapeHtml(q)}">
      <span class="sw-q-text">${escapeHtml(q)}</span>
      <button class="sw-q-x" data-action="remove" title="remove">✕</button>
    </div>`
  ).join("") : `<div class="sw-q-empty drop-hint">drag queries here, or add your own ↓</div>`;
  const domain = _swCurrentBrandDomain();
  const siteToggle = domain
    ? `<label class="sw-site-toggle">
        <input type="checkbox" id="sw-site-toggle" ${cs.siteToggle ? "checked" : ""}>
        force results from <code>${escapeHtml(domain)}</code> only
        <span class="sw-site-toggle-hint">(adds <code>site:${escapeHtml(domain)}</code> to every query)</span>
      </label>` : "";
  const resultHtml = STATE._modeComposed
    ? swRenderTableCompact(STATE._modeComposed.final, "composed")
    : `<div class="sw-col-empty">click Re-run after composing your queries</div>`;
  return `<div class="sw-composed-col">
    <div class="sw-q-section">
      <div class="sw-q-section-title">baseline queries (drag to compose, 👍/👎 to rate)</div>
      <div class="sw-q-list">${baselineChips}</div>
    </div>
    <div class="sw-q-section">
      <div class="sw-q-section-title">your composed set</div>
      <div class="sw-q-list drop-zone" id="sw-composed-drop">${composedChips}</div>
      <input type="text" class="sw-q-custom" id="sw-q-custom" placeholder="+ add a custom query and press enter" value="${escapeHtml(cs.customInput)}">
      ${siteToggle}
    </div>
    <div class="sw-composed-actions">
      <button class="sw-composed-run" id="sw-composed-run" ${!cs.composed.length ? "disabled" : ""}>
        Re-run with composed queries →
      </button>
    </div>
    <div class="sw-composed-result">${resultHtml}</div>
  </div>`;
}

function swLabelFor(e, brandLower) {
  const pills = (e._simulated ? '<span class="sim-pill">simulated</span>' : "")
              + (e._brand_side ? '<span class="brand-pill">brand</span>' : "");
  if (e.type === "rec") {
    const isYou = brandLower && (e.brand || "").toLowerCase().includes(brandLower);
    const arrow = (isYou || e._simulated) ? '<span class="you-arrow">→</span> ' : "";
    return `${arrow}<span class="rank-pill">#${e.rank}</span> <b>${escapeHtml(e.brand || "")}</b>${pills}`;
  }
  const dom = e.domain ? `<span class="dim"> · ${escapeHtml(e.domain)}</span>` : "";
  return `<span class="cit-pill">cit</span> ${escapeHtml(e.anchor || "")}${dom}${pills}`;
}

const METRICUS_STUDIO_URL = "https://metricus-studio.red-hill-a87d.workers.dev/";

async function callStudio(body) {
  const r = await fetch(METRICUS_STUDIO_URL, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(`studio ${r.status}: ${(await r.text()).slice(0, 200)}`);
  const j = await r.json();
  if (Array.isArray(j.recommendations)) {
    for (const r of j.recommendations) {
      r.type = "rec";
      r.E_engagement = r.eng_per_1k;
      if (r.simulated) r._simulated = true;
    }
  }
  return j;
}

function swRenderShell({ baselineLoading = false, interleavedLoading = false } = {}) {
  return `<div class="sw-compare">
    ${swColumnHtml("baseline", { loading: baselineLoading })}
    ${swColumnHtml("composed", {})}
    ${swColumnHtml("interleaved", { loading: interleavedLoading })}
  </div>`;
}

function swColumnHtml(colKey, opts) {
  const titles = {
    baseline: {
      title: "how AI sees you right now",
      sub: "natural AI response, no tuning",
      help: "AI's blind answer to your prompt — no tuning, no brand info. Use this to see where you stand naturally and compare every other column against it.",
    },
    composed: {
      title: "retrieval explorer",
      sub: "which queries surface you?",
      help: "AI searches the web before answering. Curate which queries it uses — drag the ones you like, write your own, or force results from your domain only. Re-run to see how the AI's recommendation shifts when retrieval changes.",
    },
    interleaved: {
      title: "creatives designer",
      sub: "design your title + snippet",
      help: "Design the title and snippet AI would see if your page appeared in search. Edit the wording, re-run, and watch how AI ranks you when given this specific creative. Export your final version for your team.",
    },
  };
  const t = titles[colKey];
  let body;
  if (opts.loading) body = swLoadingBlock();
  else if (colKey === "composed") body = swComposedBody();
  else if (colKey === "interleaved") body = swInterleavedBody();
  else body = swBaselineBody();
  return `<div class="sw-col" data-col="${colKey}">
    <div class="sw-col-head">
      <div class="sw-col-title">${t.title}<span class="sw-help" data-tip="${escapeHtml(t.help)}" tabindex="0">?</span></div>
      <div class="sw-col-sub">${t.sub}</div>
    </div>
    <div class="sw-col-body ${opts.loading ? 'loading' : ''}">${body}</div>
    ${swColFooter(colKey)}
  </div>`;
}

function swLoadingBlock() {
  return `<div class="sw-col-loading">
    ${SW_AGENT_ICON_HTML}
    <div class="sw-loading-status">starting</div>
    <div class="sw-fact-wrap" style="margin-top:18px">
      <div class="sw-fact-eyebrow">did you know</div>
      <p class="sw-fact-text show sw-tip-target">${escapeHtml(swPickFacts(1)[0])}</p>
    </div>
  </div>`;
}

function swBaselineBody() {
  if (!STATE._modeBaseline) return `<div class="sw-col-empty">no data</div>`;
  return swRenderTableCompact(STATE._modeBaseline.final, "baseline");
}

function swInterleavedBody() {
  const sb = STATE._sandbox || { title: "", snippet: "", url: "" };
  const tableHtml = STATE._modeInterleaved
    ? swRenderTableCompact(STATE._modeInterleaved.final, "interleaved")
    : `<div class="sw-col-empty">edit content sandbox below and re-run</div>`;
  return `<div class="sw-sandbox-inline">
    <div class="sw-sandbox-inline-title">CONTENT SANDBOX <span class="dim">— how AI would describe you</span></div>
    <label class="sw-sb-lbl">Title</label>
    <input type="text" id="sw-sb-title" maxlength="160" value="${escapeHtml(sb.title)}" placeholder="e.g. Metricus — AI Visibility Audit">
    <label class="sw-sb-lbl">Snippet</label>
    <textarea id="sw-sb-snippet" maxlength="500" rows="3" placeholder="the meta description AI would see">${escapeHtml(sb.snippet)}</textarea>
    <div class="sw-sb-actions">
      <button class="sw-composed-run" id="sw-sb-run">${STATE._modeInterleaved ? "Re-run interleaved" : "Run interleaved"} →</button>
    </div>
  </div>
  ${tableHtml}`;
}

function swComposedBody() {
  return swRenderComposedColumn();
}

function swColFooter(colKey) {
  const data = colKey === "baseline" ? STATE._modeBaseline
             : colKey === "composed" ? STATE._modeComposed
             : STATE._modeInterleaved;
  const reply = data?.distill?.body || "";
  const preview = reply ? escapeHtml(reply.slice(0, 80).trim()).replace(/\s+/g, " ") + "…" : "";
  STATE._aiThumbs = STATE._aiThumbs || {};
  const thumbState = STATE._aiThumbs[colKey];
  const aiBlock = reply ? `<details class="sw-col-ai">
    <summary><span class="lbl">full AI response</span> <span class="preview">${preview}</span></summary>
    <div class="sw-reply">${escapeHtml(reply.slice(0, 4000)).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/\[(\d+)\]/g, '<sup class="sw-cite">[$1]</sup>')}</div>
  </details>` : "";
  const thumbsBlock = reply ? `<div class="sw-ai-thumbs">
    <span class="sw-ai-thumbs-lbl">useful?</span>
    <button class="sw-ai-thumb up ${thumbState === "up" ? "active" : ""}" data-ai-thumb-col="${colKey}" data-ai-thumb-dir="up" title="useful answer">👍</button>
    <button class="sw-ai-thumb down ${thumbState === "down" ? "active" : ""}" data-ai-thumb-col="${colKey}" data-ai-thumb-dir="down" title="not useful">👎</button>
  </div>` : "";
  const exportBtn = (colKey === "interleaved" && data)
    ? `<button class="sw-col-export" data-export-col="${colKey}">Export creative ↓</button>`
    : "";
  if (!aiBlock && !exportBtn) return "";
  return `<div class="sw-col-footer">${aiBlock}${thumbsBlock}${exportBtn}</div>`;
}

function swSetColStage(colKey, statusText) {
  const body = document.querySelector(`#sw-result .sw-col[data-col="${colKey}"] .sw-col-body`);
  if (!body) return;
  const st = body.querySelector(".sw-loading-status");
  if (st) st.textContent = statusText;
}

function swRenderColumnDone(colKey) {
  const out = document.getElementById("sw-result");
  const col = out?.querySelector(`.sw-col[data-col="${colKey}"]`);
  if (!col) return;
  const body = col.querySelector(".sw-col-body");
  body.classList.remove("loading");
  let bodyHtml;
  if (colKey === "baseline") bodyHtml = swBaselineBody();
  else if (colKey === "composed") bodyHtml = swComposedBody();
  else bodyHtml = swInterleavedBody();
  body.innerHTML = bodyHtml;
  const oldFoot = col.querySelector(".sw-col-footer");
  if (oldFoot) oldFoot.remove();
  const tmp = document.createElement("div");
  tmp.innerHTML = swColFooter(colKey);
  if (tmp.firstChild) col.appendChild(tmp.firstChild);
  swWireCommonHandlers();
}

function swRenderColumnError(colKey, e) {
  const body = document.querySelector(`#sw-result .sw-col[data-col="${colKey}"] .sw-col-body`);
  if (!body) return;
  body.classList.remove("loading");
  body.innerHTML = `<div class="sw-col-empty" style="color:var(--bad)">failed — ${escapeHtml((e?.message || "").slice(0, 160))}</div>`;
}

function swStartTipRotation() {
  const facts = swPickFacts(8);
  let idx = 0;
  STATE._tipInterval = setInterval(() => {
    const els = document.querySelectorAll(".sw-tip-target");
    if (!els.length) return;
    els.forEach(el => el.classList.remove("show"));
    setTimeout(() => {
      idx = (idx + 1) % facts.length;
      els.forEach(el => { el.textContent = facts[idx]; el.classList.add("show"); });
    }, 400);
  }, 5000);
}
function swStopTipRotation() {
  if (STATE._tipInterval) { clearInterval(STATE._tipInterval); STATE._tipInterval = null; }
}

function swWireCommonHandlers() {
  const out = document.getElementById("sw-result");
  if (!out) return;
  out.querySelectorAll("[data-export-col]").forEach(b => {
    b.addEventListener("click", () => swExportColumn(b.dataset.exportCol));
  });
  out.querySelectorAll(".sw-ai-thumb").forEach(btn => {
    btn.addEventListener("click", () => {
      const col = btn.dataset.aiThumbCol;
      const dir = btn.dataset.aiThumbDir;
      STATE._aiThumbs = STATE._aiThumbs || {};
      STATE._aiThumbs[col] = (STATE._aiThumbs[col] === dir) ? null : dir;
      out.querySelectorAll(`.sw-ai-thumb[data-ai-thumb-col="${col}"]`).forEach(b => {
        b.classList.toggle("active", STATE._aiThumbs[col] === b.dataset.aiThumbDir);
      });
      swLog("ai_response_thumb", { column: col, thumb: STATE._aiThumbs[col] || "off", prompt: STATE._lastPrompt });
    });
  });
  const sbTitle = out.querySelector("#sw-sb-title");
  const sbSnippet = out.querySelector("#sw-sb-snippet");
  sbTitle?.addEventListener("input", () => { STATE._sandbox.title = sbTitle.value; });
  sbSnippet?.addEventListener("input", () => { STATE._sandbox.snippet = sbSnippet.value; });
  out.querySelector("#sw-sb-run")?.addEventListener("click", async () => {
    const btn = out.querySelector("#sw-sb-run");
    const sb = STATE._sandbox;
    if (!sb?.title?.trim() && !sb?.snippet?.trim()) return;
    swLog("interleaved_rerun", {
      prompt: STATE._lastPrompt,
      title: sb.title?.slice(0, 200),
      snippet: sb.snippet?.slice(0, 400),
    });
    btn.disabled = true; btn.textContent = "running…";
    const body = out.querySelector(`.sw-col[data-col="interleaved"] .sw-col-body`);
    body.classList.add("loading");
    body.innerHTML = swLoadingBlock();
    swStartTipRotation();
    swSetColStage("interleaved", "running");
    try {
      const result = await runInterleaved(STATE._lastPrompt, sb);
      STATE._modeInterleaved = result;
      swStopTipRotation();
      swRenderColumnDone("interleaved");
    } catch (e) {
      swStopTipRotation();
      swRenderColumnError("interleaved", e);
    } finally {
      btn.disabled = false; btn.textContent = "Re-run interleaved →";
    }
  });
  swWireComposedHandlers();
}

function swWireComposedHandlers() {
  const out = document.getElementById("sw-result");
  if (!out) return;
  const cs = STATE._composedState;
  if (!cs) return;
  out.querySelectorAll(".sw-q-chip .sw-q-thumb").forEach(b => {
    b.addEventListener("click", (e) => {
      e.stopPropagation();
      const chip = b.closest(".sw-q-chip");
      const q = chip.dataset.q;
      const dir = b.dataset.thumb;
      cs.thumbs[q] = (cs.thumbs[q] === dir) ? undefined : dir;
      swLog("query_thumb", { query: q, thumb: cs.thumbs[q] || "off", prompt: STATE._lastPrompt });
      swRenderColumnDone("composed");
    });
  });
  out.querySelectorAll(".sw-q-chip[draggable='true']").forEach(chip => {
    chip.addEventListener("dragstart", (e) => {
      e.dataTransfer.setData("text/plain", chip.dataset.q);
      e.dataTransfer.effectAllowed = "copy";
      chip.classList.add("dragging");
    });
    chip.addEventListener("dragend", () => chip.classList.remove("dragging"));
    chip.addEventListener("click", (e) => {
      if (e.target.closest(".sw-q-thumb")) return;
      const q = chip.dataset.q;
      if (!cs.composed.includes(q)) cs.composed.push(q);
      swRenderColumnDone("composed");
    });
  });
  const drop = out.querySelector("#sw-composed-drop");
  if (drop) {
    drop.addEventListener("dragover", (e) => { e.preventDefault(); drop.classList.add("drag-over"); });
    drop.addEventListener("dragleave", () => drop.classList.remove("drag-over"));
    drop.addEventListener("drop", (e) => {
      e.preventDefault();
      drop.classList.remove("drag-over");
      const q = e.dataTransfer.getData("text/plain");
      if (q && !cs.composed.includes(q)) cs.composed.push(q);
      swRenderColumnDone("composed");
    });
  }
  out.querySelectorAll(".sw-q-chip.composed .sw-q-x").forEach(b => {
    b.addEventListener("click", (e) => {
      e.stopPropagation();
      const q = b.closest(".sw-q-chip").dataset.q;
      cs.composed = cs.composed.filter(x => x !== q);
      swRenderColumnDone("composed");
    });
  });
  const custom = out.querySelector("#sw-q-custom");
  if (custom) {
    custom.addEventListener("input", () => { cs.customInput = custom.value; });
    custom.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        const v = custom.value.trim();
        if (v && !cs.composed.includes(v)) {
          cs.composed.push(v);
          cs.customInput = "";
          swLog("custom_query", { query: v, prompt: STATE._lastPrompt });
          swRenderColumnDone("composed");
        }
      }
    });
  }
  const siteTog = out.querySelector("#sw-site-toggle");
  if (siteTog) siteTog.addEventListener("change", () => { cs.siteToggle = siteTog.checked; });
  const runBtn = out.querySelector("#sw-composed-run");
  if (runBtn) {
    runBtn.addEventListener("click", async () => {
      if (!cs.composed.length) return;
      runBtn.disabled = true; runBtn.textContent = "running…";
      const body = out.querySelector(`.sw-col[data-col="composed"] .sw-col-body`);
      body.classList.add("loading");
      body.innerHTML = swLoadingBlock();
      swStartTipRotation();
      swSetColStage("composed", "running");
      try {
        const result = await runComposed(STATE._lastPrompt, cs);
        STATE._modeComposed = result;
        swLog("composed_run", {
          prompt: STATE._lastPrompt,
          composed_queries: cs.composed,
          site_toggle: cs.siteToggle,
          n_thumbs_up: Object.values(cs.thumbs).filter(t => t === "up").length,
          n_thumbs_down: Object.values(cs.thumbs).filter(t => t === "down").length,
        });
        swStopTipRotation();
        swRenderColumnDone("composed");
      } catch (e) {
        swStopTipRotation();
        swRenderColumnError("composed", e);
      } finally {
        runBtn.disabled = false; runBtn.textContent = "Re-run with composed queries →";
      }
    });
  }
}

function swExportColumn(colKey) {
  if (colKey !== "interleaved") return;
  const data = STATE._modeInterleaved;
  const sb = STATE._sandbox || {};
  if (!data) return;
  const ts = new Date().toISOString();
  const brand = (document.getElementById("sw-brand")?.value || "").trim();
  const payload = {
    schema_version: "metricus-creative/v1",
    timestamp: ts,
    prompt_investigated: STATE._lastPrompt || "",
    creative: { title: sb.title || "", snippet: sb.snippet || "", url: sb.url || STATE._lastSourceUrl || "" },
    brand_context: {
      raw_text: brand,
      resolved_name: STATE._lastBrand || null,
      scraped_metadata: STATE._lastBrandContext || null,
    },
    projected_ai_response: data.distill?.body || "",
    projected_recommendations: (data.final || []).filter(e => e.type === "rec").map(r => ({
      rank: r.rank, brand: r.brand, simulated: !!r._simulated,
      E_ctr_pct: r.E_ctr_pct, E_cvr_pct: r.E_cvr_pct, eng_per_1k: r.E_engagement,
    })),
    cluster_baseline: STATE._lastEngagement ? {
      cluster: STATE._lastEngagement.neighbors?.[0]?.keyword,
      confidence: STATE._lastEngagement.confidence,
      ctr_pct: STATE._lastEngagement.ctr_pct,
      cvr_pct: STATE._lastEngagement.cvr_pct,
      eng_per_1k: STATE._lastEngagement.engagement_per_1k_imp,
    } : null,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `metricus-creative-${ts.slice(0,19).replace(/[:T]/g, "-")}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  swLog("export_creative", {
    prompt: payload.prompt_investigated,
    brand_raw: brand.slice(0, 200),
    title: payload.creative.title,
    snippet: payload.creative.snippet,
  });
}

async function swRun() {
  const prompt = (document.getElementById("sw-prompt")?.value || "").trim();
  const brandRaw = (document.getElementById("sw-brand")?.value || "").trim();
  const out = document.getElementById("sw-result");
  if (!prompt) {
    document.getElementById("sw-prompt")?.focus();
    return;
  }
  const btn = document.getElementById("sw-run");
  if (btn) { btn.disabled = true; btn.textContent = "Asking…"; }
  document.querySelector(".simple-workbench")?.classList.add("has-result");
  // Reset state for a fresh run
  STATE._modeBaseline = null;
  STATE._modeInterleaved = null;
  STATE._modeComposed = null;
  STATE._composedState = null;
  STATE._lastEngagement = null;
  STATE._lastSourceUrl = null;
  STATE._lastPrompt = prompt;
  STATE._lastBrand = brandRaw;
  STATE._lastBaselineQueries = [];
  out.innerHTML = swRenderShell({ baselineLoading: true, interleavedLoading: true });
  swStartTipRotation();
  swLog("prediction_run", { prompt, brand: brandRaw.slice(0, 200) });
  try {
    swSetColStage("baseline", "running");
    swSetColStage("interleaved", "running");
    // Baseline always; interleaved if sandbox has any pre-existing content (re-runs)
    // or if we can populate defaults from a JSON-LD scrape inside the worker.
    const sb = STATE._sandbox || (STATE._sandbox = { title: "", snippet: "", url: "" });
    const baselineP = callStudio({ mode: "baseline", prompt, brand: brandRaw });
    // First-run interleaved: we may not have sandbox content yet. Run baseline first,
    // hydrate sandbox from its brand_context, then fire interleaved.
    const result = await baselineP;
    STATE._modeBaseline = swPackResult(result);
    STATE._lastBaselineQueries = result.queries || [];
    STATE._lastEngagement = result.engagement || null;
    STATE._lastSourceUrl = result.brand_context?.source_url || null;
    STATE._lastBrandContext = swFlattenBrandContext(result.brand_context);
    swLog("baseline_complete", {
      prompt, brand: brandRaw.slice(0, 200),
      queries: result.queries || [],
      n_recs: (result.recommendations || []).length,
      top_recs: (result.recommendations || []).slice(0, 5).map(r => ({ rank: r.rank, brand: r.brand })),
      cluster: result.engagement?.neighbors?.[0]?.keyword || null,
      confidence: result.engagement?.confidence || null,
      ctr_pct: result.engagement?.ctr_pct || null,
      cvr_pct: result.engagement?.cvr_pct || null,
      brand_resolved: result.brand_context?.resolved_name || null,
      warnings: result.warnings || [],
    });
    // Auto-populate sandbox defaults from brand_context if empty
    if (!sb.title && result.brand_context?.title) sb.title = result.brand_context.title.slice(0, 120);
    if (!sb.snippet && result.brand_context?.description) sb.snippet = result.brand_context.description.slice(0, 400);
    if (!sb.url && result.brand_context?.source_url) sb.url = result.brand_context.source_url;
    swRenderColumnDone("baseline");
    swRenderColumnDone("composed");  // composed needs queries to render its chips
    // Now fire interleaved if we have sandbox content
    if (sb.title?.trim() || sb.snippet?.trim()) {
      try {
        const r2 = await callStudio({ mode: "interleaved", prompt, brand: brandRaw, sandbox: sb });
        STATE._modeInterleaved = swPackResult(r2);
      } catch (e) {
        swRenderColumnError("interleaved", e);
        throw e;
      }
      swRenderColumnDone("interleaved");
    } else {
      // No sandbox content yet — show empty state with prompt to edit
      swRenderColumnDone("interleaved");
    }
  } catch (e) {
    console.error("[studio]", e);
    document.querySelectorAll(".sw-col-body.loading").forEach(b => {
      b.innerHTML = `<div class="sw-col-empty" style="color:var(--bad)">failed — ${escapeHtml((e?.message || "").slice(0, 160))}</div>`;
    });
  } finally {
    swStopTipRotation();
    if (btn) { btn.disabled = false; btn.textContent = "Run prediction for this prompt"; }
  }
}

function swPackResult(r) {
  return {
    distill: { body: r.ai_response || "", sources: (r.citations || []).map(c => c.idx) },
    final: r.recommendations || [],
    citations: r.citations || [],
    queries: r.queries || [],
    warnings: r.warnings || [],
  };
}

function swFlattenBrandContext(bc) {
  if (!bc) return "";
  const lines = [];
  if (bc.title) lines.push(`Page title: ${bc.title}`);
  if (bc.description) lines.push(`Description: ${bc.description}`);
  if (bc.resolved_name) lines.push(`Name: ${bc.resolved_name}`);
  return lines.join("\n");
}

async function runInterleaved(prompt, sim) {
  const brand = (document.getElementById("sw-brand")?.value || "").trim();
  const r = await callStudio({ mode: "interleaved", prompt, brand, sandbox: sim });
  return swPackResult(r);
}

async function runComposed(prompt, cs) {
  const brand = (document.getElementById("sw-brand")?.value || "").trim();
  const r = await callStudio({
    mode: "composed",
    prompt,
    brand,
    composed_queries: cs.composed,
    site_toggle: !!cs.siteToggle,
  });
  return swPackResult(r);
}

(function swInit() {
  const inp = document.getElementById("sw-prompt");
  const btn = document.getElementById("sw-run");
  if (!inp || !btn) return;
  btn.addEventListener("click", swRun);
  inp.addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); swRun(); }
  });
  const counter = document.getElementById("sw-prompt-counter");
  const SW_MAX = 5000;
  const updateCounter = () => {
    const n = inp.value.length;
    counter.textContent = `${n.toLocaleString()} / ${SW_MAX.toLocaleString()}`;
    counter.classList.toggle("near", n >= SW_MAX * 0.9 && n < SW_MAX);
    counter.classList.toggle("full", n >= SW_MAX);
  };
  inp.addEventListener("input", updateCounter);
  updateCounter();
})();
</script>
</body>
</html>
